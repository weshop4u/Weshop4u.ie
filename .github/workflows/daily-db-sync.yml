name: Daily Database Sync

on:
  schedule:
    # Run at 1:00 AM UTC every day
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-databases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install

      - name: Run database sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_BACKUP: ${{ secrets.DATABASE_URL_BACKUP }}
        run: npx tsx scripts/sync-databases.ts

      - name: Notify on failure
        if: failure()
        run: |
          echo "Database sync failed at $(date)"
          echo "Check the logs for details"
