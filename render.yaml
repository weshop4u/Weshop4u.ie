services:
  - type: web
    name: weshop4u-backend
    runtime: node
    plan: standard
    buildCommand: pnpm install --frozen-lockfile && npx expo export --platform web --output-dir web-dist --clear && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OAUTH_SERVER_URL
        value: https://api.manus.im
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: ELAVON_PROCESSOR_ID
        sync: false
      - key: ELAVON_SECRET_KEY
        sync: false
      - key: ELAVON_MERCHANT_ALIAS
        sync: false
      - key: ELAVON_PUBLIC_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: VITE_FRONTEND_FORGE_API_URL
        sync: false
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
